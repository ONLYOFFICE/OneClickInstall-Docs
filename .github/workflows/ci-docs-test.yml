name: Install OCI Docs

on:
  push:
    branches:
      - 'hotfix/**'
      - 'release/**'
      - 'develop'
      - 'master'
    paths:
      - '.github/workflows/ci-docs-test.yml'
      - 'docs-install.sh'
      - 'install-*.sh'
      - 'install-*/**'
      - 'tests/**'

  workflow_dispatch:
    inputs:
      distros:
        type: string
        description: Select distros (comma-separated)
        default: |
          rhel8,
          rhel9,
          centos8s,
          centos9s,
          centos10,
          amazonlinux2023,
          debian10,
          debian11,
          debian12,
          debian13,
          ubuntu2004,
          ubuntu2204,
          ubuntu2404,
          ubuntu2604,
          ubuntu2404-arm
      deb_build:
        type: boolean
        description: "Override: All DEB-based distros"
        default: false
      rpm_build:
        type: boolean
        description: "Override: All RPM-based distros"
        default: false
      installationtype:
        type: choice
        description: 'Installation type'
        default: 'enterprise'
        options:
          - enterprise
          - community
          - developer

  schedule:
    - cron: '0 21 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      version: ${{ steps.get-version.outputs.version }}
    steps:

      - name: Set matrix names
        id: set-matrix
        env:
          OS_ORDER: rhel8 rhel9 centos8s centos9s centos10 amazonlinux2023 debian10 debian11 debian12 debian13 ubuntu2004 ubuntu2204 ubuntu2404 ubuntu2604
          OS_MAP: |
            {
              "rhel8":           ["RHEL 8",            "generic",    "rhel8"],
              "rhel9":           ["RHEL 9",            "onlyoffice", "base-rhel9"],
              "centos8s":        ["CentOS 8 Stream",   "onlyoffice", "base-centos8s"],
              "centos9s":        ["CentOS 9 Stream",   "onlyoffice", "base-centos9s"],
              "centos10":        ["CentOS 10 Stream",  "onlyoffice", "base-centos10"],
              "amazonlinux2023": ["Amazon Linux 2023", "bento",      "amazonlinux-2023"],
              "debian10":        ["Debian 10",         "onlyoffice", "base-debian10"],
              "debian11":        ["Debian 11",         "onlyoffice", "base-debian11"],
              "debian12":        ["Debian 12",         "onlyoffice", "base-debian12"],
              "debian13":        ["Debian 13",         "onlyoffice", "base-debian13"],
              "ubuntu2004":      ["Ubuntu 20.04",      "onlyoffice", "base-ubuntu2004"],
              "ubuntu2204":      ["Ubuntu 22.04",      "onlyoffice", "base-ubuntu2204"],
              "ubuntu2404":      ["Ubuntu 24.04",      "onlyoffice", "base-ubuntu2404"],
              "ubuntu2604":      ["Ubuntu 26.04",      "cloud-image", "ubuntu-26.04"]
            }
        run: |
          declare -A os_set

          # For scheduled or push runs, use all distros
          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "push" ]]; then
            for os in $(jq -r 'keys[]' <<< "$OS_MAP"); do os_set["$os"]=1; done
          # Handle individual distro selection (only when no override flags set)
          elif [[ "${{ github.event.inputs.deb_build }}" != "true" && "${{ github.event.inputs.rpm_build }}" != "true" ]]; then
            DISTROS_INPUT="${{ github.event.inputs.distros }}"
            for os in ${DISTROS_INPUT//,/ }; do
              os_trimmed="$(echo "$os" | xargs)"
              [[ -n "$os_trimmed" ]] && os_set["$os_trimmed"]=1
            done
          fi

          # Override: All DEB-based distros (Debian/Ubuntu)
          [[ "${{ github.event.inputs.deb_build }}" == "true" ]] && \
            for os in $(jq -r 'to_entries[] | select(.value[0] | test("Debian|Ubuntu")) | .key' <<< "$OS_MAP"); do os_set["$os"]=1; done

          # Override: All RPM-based distros (CentOS/RHEL/Amazon)
          [[ "${{ github.event.inputs.rpm_build }}" == "true" ]] && \
            for os in $(jq -r 'to_entries[] | select(.value[0] | test("CentOS|RHEL|Amazon")) | .key' <<< "$OS_MAP"); do os_set["$os"]=1; done

          # Build matrix in defined order
          matrix=$(jq -c -n --argjson map "$OS_MAP" --arg order "$OS_ORDER" \
            --argjson list "$(printf '%s\n' "${!os_set[@]}" | jq -R . | jq -s .)" \
            '{include: [($order | split(" "))[] | select(. as $k | $list[] == $k) | {name: $map[.][0], os: ($map[.][2] // .), distr: $map[.][1]}]}')

          echo "matrix=$matrix" >> $GITHUB_OUTPUT

      - id: get-version
        run: |
          VERSION=$(git ls-remote --heads "https://${{ secrets.GITEA_TOKEN }}@${{ secrets.GITEA_HOST }}/ONLYOFFICE/document-server-package" \
            'refs/heads/release/v*' 'refs/heads/hotfix/v*' | awk -F/ '{print $NF}' | sed 's/^v//' | sort -Vr | head -n1)
          echo "version=${VERSION:-99.99.99}" >> "$GITHUB_OUTPUT"

  vagrant-up:
    name: "Install (${{ matrix.name }})"
    needs: [prepare]
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: tests/vagrant
    env:
      VER: ${{ needs.prepare.outputs.version }}
    strategy:
      fail-fast: false
      matrix: ${{fromJSON(needs.prepare.outputs.matrix)}}

    steps:
      - name: Free Disk Space
        working-directory: ${{ github.workspace }}
        run: |
          sudo docker image prune --all --force
          sudo rm -rf /usr/local/lib/android || true

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get update and install vagrant
        working-directory: ${{ github.workspace }}
        run: |
          set -eux
          sudo wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          sudo echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(grep -oP '(?<=UBUNTU_CODENAME=).*' /etc/os-release || lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt update -y
          sudo apt-get install -y vagrant
          # Temporary install VBox 7.1.12 via curl (.deb) to avoid SSH/NAT issues in 7.1.14
          VBOX_DEB=$(curl -fsSL https://download.virtualbox.org/virtualbox/7.1.12/MD5SUMS | grep -oE 'virtualbox-7\.1_7\.1\.12-[0-9]+~Ubuntu~jammy_amd64\.deb' | head -n1)
          [ -n "$VBOX_DEB" ] || { echo "ERROR: could not detect VBox .deb filename"; exit 1; }
          curl -fsSL "https://download.virtualbox.org/virtualbox/7.1.12/${VBOX_DEB}" -o /tmp/vbox.deb
          sudo apt-get install -y /tmp/vbox.deb

      - name: Install
        timeout-minutes: 90
        env:
          DISTR: ${{ matrix.distr }}
          RAM: '4096'
          CPU: '2'
          OS: ${{ matrix.os }}
          IT: '-it ${{ github.event.inputs.installationtype || ''enterprise'' }}'
        run: |
          set -eux
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            export DOWNLOAD_SCRIPT='-ds true'
            export TEST_CASE='--production-install'
            export ARGUMENTS="-arg '--skiphardwarecheck true --makeswap false'"
          else
            export DOWNLOAD_SCRIPT='-ds false'
            export TEST_REPO='-tr true'
            export VER="-v ${VER}"
            export ARGUMENTS="-arg '--skiphardwarecheck true --makeswap false --localscripts true'"
          fi
          vagrant up --provider=virtualbox

      - name: Health check
        run: |
          if vagrant status | grep -q "running"; then
            vagrant ssh -c "sudo bash /home/vagrant/tests/vagrant/post-install.sh healthcheck" || true
          else
            echo "VM is not running, skipping health check"
          fi

      - name: Uninstall
        timeout-minutes: 20
        run: |
          if vagrant status | grep -q "running"; then
            vagrant ssh -c "sudo bash /home/vagrant/tests/vagrant/post-install.sh uninstall ${{ github.event_name != 'schedule' && '--localscripts true' || '' }}"
          else
            echo "VM is not running, cannot run uninstall test"
            exit 1
          fi

      - name: Collect logs
        if: always()
        run: |
          if vagrant status | grep -q "running"; then
            vagrant ssh -c "sudo bash /home/vagrant/tests/vagrant/post-install.sh logs" || true
          else
            echo "VM is not running, skipping log collection"
          fi

      - name: Cleanup
        if: always()
        run: |
          vagrant destroy --force || true
          vagrant global-status --prune || true

  arm-native:
    name: "Install (Ubuntu 24.04) [ARM]"
    needs: [prepare]
    if: github.event_name == 'schedule' || github.event_name == 'push' || contains(github.event.inputs.distros, 'ubuntu2404-arm')
    runs-on: ubuntu-24.04-arm
    env:
      VER: ${{ needs.prepare.outputs.version }}
    steps:
    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/local/lib/android || true

    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install
      timeout-minutes: 25
      run: |
        set -eux
        if [[ "${{ github.event_name }}" == "schedule" ]]; then
          sudo timeout --kill-after=60s 15m bash tests/vagrant/install.sh -ds true -it '${{ github.event.inputs.installationtype || 'enterprise' }}' -arg '--skiphardwarecheck true --makeswap false'
        else
          sudo timeout --kill-after=60s 15m bash tests/vagrant/install.sh -ds false -v "${VER}" -tr true -it '${{ github.event.inputs.installationtype || 'enterprise' }}' -arg '--skiphardwarecheck true --makeswap false --localscripts true'
        fi

    - name: Uninstall
      timeout-minutes: 20
      run: |
        sudo bash tests/vagrant/post-install.sh uninstall ${{ github.event_name != 'schedule' && '--localscripts true' || '' }}
