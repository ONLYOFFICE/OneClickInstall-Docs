name: Cron triggered workflows

on:
  schedule:
    - cron: '0 21 * * 0'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  trigger-workflows:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Select latest release branch
        id: selected
        run: |
          latest_branch=$(gh api "repos/${GITHUB_REPOSITORY}/branches?per_page=100" \
            --jq '.[] | select(.name | test("^(release|hotfix)/v[0-9]+\\.[0-9]+\\.[0-9]+$")) | .name' \
            | sort -Vr | head -n1)
          echo "branch=${latest_branch}" >> "$GITHUB_OUTPUT"

      - name: Trigger ci-update on ${{ steps.selected.outputs.branch }}
        if: steps.selected.outputs.branch != ''
        run: |
          gh workflow run ci-update.yml --repo "${GITHUB_REPOSITORY}" --ref "${{ steps.selected.outputs.branch }}"
